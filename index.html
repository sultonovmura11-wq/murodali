<script>
// Адрес вашего запущенного сервера VPS за 600 рублей
const SERVER_IP = "http://194.251.222.134"; 

function handleConnectButtonClick() {
    // Делаем прямой запрос к вашему VPS без лишних проверок
    fetch(`${SERVER_IP}/get-key`)
    .then(res => res.json())
    .then(data => {
        if (data.key) {
            // Сохраняем выданный ключ в память устройства
            localStorage.setItem("vpn_allocated_key", data.key);

            // Копируем сгенерированный ключ в буфер обмена телефона/ПК
            navigator.clipboard.writeText(data.key).then(() => {
                alert("Успешно! Ваш личный VPN-ключ сгенерирован вашим сервером и скопирован в буфер обмена.\n\nВставьте его в приложение v2rayNG, Amnezia или Hiddify для подключения.");
            }).catch(() => {
                // Если браузер запретил автокопирование, просто показываем ключ на экране
                alert("Ваш VPN-ключ готов:\n\n" + data.key + "\n\nСкопируйте его вручную и вставьте в v2rayNG / Hiddify.");
            });
        } else {
            alert("Сервер не смог сгенерировать ключ. Проверьте статус бэкенда.");
        }
    })
    .catch(err => {
        alert("Не удалось связаться с вашим сервером VPS. Возможно, нужно перезапустить скрипт server.js командой node server.js &");
    });
}

// Привязываем функцию к кнопке "ПОДКЛЮЧИТЬ БЕСПЛАТНО"
document.addEventListener('DOMContentLoaded', () => {
    const mainConnectBtn = document.querySelector('.btn');
    if (mainConnectBtn) {
        mainConnectBtn.removeAttribute('onclick'); // Полностью очищаем старые переходы в ТГ
        mainConnectBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            handleConnectButtonClick();
        });
    }
    
    // Принудительно заставляем сайт всегда показывать главный экран приложения
    if(document.getElementById('app-screen')) document.getElementById('app-screen').style.display = "block";
    if(document.getElementById('blocked-screen')) document.getElementById('blocked-screen').style.display = "none";
});
</script>
