<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murodali VPN Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: radial-gradient(circle, #0a0a12 0%, #05050a 100%); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 0 30px rgba(79, 172, 254, 0.3); }
        h1 { font-size: 24px; margin-bottom: 10px; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 14px; color: #888; line-height: 1.5; margin-bottom: 25px; }
        .btn { display: block; width: 100%; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; padding: 14px; font-size: 14px; font-weight: 700; border: none; border-radius: 14px; text-decoration: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(79, 172, 254, 0.2); line-height: 20px;}
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ГЛАВНОЕ ПРИЛОЖЕНИЕ -->
    <div class="card" id="app-screen" style="display: block;">
        <div class="logo">⚡</div>
        <h1>MURODALI VPN</h1>
        <p>Высокоскоростной безопасный интернет. Нажмите кнопку ниже для получения личного ключа подключения.</p>
        <button class="btn" id="connect-main-btn">ПОДКЛЮЧИТЬ БЕСПЛАТНО</button>
    </div>

    <!-- ЭКРАН 2: БЛОКИРОВКА -->
    <div class="card" id="blocked-screen" style="display: none;">
        <div class="logo">❌</div>
        <h1>ВРЕМЯ ИСТЕКЛО</h1>
        <p>Ваш бесплатный 24-часовой тестовый период закончился. Перейдите в нашего бота для оформления подписки.</p>
        <a href="https://t.me" class="btn" style="text-align: center; display: block; text-decoration: none;">Оплатить в Telegram</a>
    </div>

<script>
// Список ваших рабочих ключей
const vpnKeys = [
    "ss://Y2hhY2hhMjA6MTIzNDU=@194.251.222.134:12345#Trial-Murodali1",
    "ss://Y2hhY2hhMjA6MTIzNDU=@194.251.222.134:12345#Trial-Murodali2",
    "ss://Y2hhY2hhMjA6MTIzNDU=@194.251.222.134:12345#Trial-Murodali3"
];

function checkVpnStatus() {
    const startTime = localStorage.getItem("vpn_start_time");
    if (startTime) {
        const timeNow = new Date().getTime();
        const twentyFourHours = 24 * 60 * 60 * 1000; // 24 часа

        if (timeNow - startTime > twentyFourHours) {
            document.getElementById('app-screen').style.display = "none";
            document.getElementById('blocked-screen').style.display = "block";
            return true;
        }
    }
    return false;
}

function handleConnectButtonClick() {
    if (localStorage.getItem("vpn_start_time")) {
        checkVpnStatus();
        return;
    }

    const randomIndex = Math.floor(Math.random() * vpnKeys.length);
    const selectedKey = vpnKeys[randomIndex];

    localStorage.setItem("vpn_start_time", new Date().getTime());
    localStorage.setItem("vpn_allocated_key", selectedKey);

    navigator.clipboard.writeText(selectedKey).then(() => {
        alert("Успешно! Ваш тестовый VPN-ключ на 24 часа скопирован в буфер обмена.\\n\\nВставьте его в приложение v2rayNG, Amnezia или Hiddify для подключения.");
        checkVpnStatus();
    }).catch(() => {
        alert("Ваш VPN-ключ готов:\\n\\n" + selectedKey + "\\n\\nСкопируйте его вручную.");
        checkVpnStatus();
    });
}

document.addEventListener('DOMContentLoaded', () => {
    const mainConnectBtn = document.getElementById('connect-main-btn');
    if (mainConnectBtn) {
        mainConnectBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleConnectButtonClick();
        });
    }
    checkVpnStatus();
});
</script>
</body>
</html>
