<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murodali VPN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 360px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; }
        .logo-glow { width: 80px; height: 80px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 0 30px rgba(79, 172, 254, 0.6); animation: pulse 2s infinite; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 14px; color: #8a8ab0; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: block; width: 100%; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 14px; text-decoration: none; transition: transform 0.2s; box-shadow: 0 8px 20px rgba(79, 172, 254, 0.3); }
        .btn:active { transform: scale(0.98); }
        @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); } 50% { box-shadow: 0 0 40px rgba(79, 172, 254, 0.8); } 100% { box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-glow">⚡</div>
        <h1>MURODALI VPN</h1>
        <p>Высокоскоростной безопасный интернет нового поколения. Подключение в один клик.</p>
        <!-- Сюда мы чуть позже вставим ссылку на твоего ТГ-бота -->
        <a href="https://t.me" class="btn">ПОДКЛЮЧИТЬ БЕСПЛАТНО</a>
    </div>
</body>
</html>
